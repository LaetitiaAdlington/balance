<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Balance</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;500;600;700&family=Sanchez&display=swap" rel="stylesheet">
  <style>
    :root{
      --bg:#fbf9f4;
      --card:#ede6d3;
      --card-soft:#f3eddf;
      --ink:#1f1c15;
      --text:#2a251c;
      --muted:#a1957c;
      --border:#e4dcc7;
      --pour:#f2a63c;
      --pour-soft:#fbe7cf;
      --contre:#e5563a;
      --contre-soft:#f9ddd4;
      --rate-a:#ffd83d;
      --rate-b:#ff5e3d;
      --radius:16px;
    }
    *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
    html,body{height:100%;}
    body{
      margin:0;
      font-family:"Quicksand",ui-rounded,system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;
      background:var(--bg);color:var(--text);line-height:1.5;-webkit-font-smoothing:antialiased;
    }
    .app{display:flex;flex-direction:column;height:100%;max-width:460px;margin:0 auto;background:var(--bg);}

    /* ---- Header ---- */
    .topbar{padding:16px 20px 0;min-height:20px;}
    .hist-pill{
      display:inline-flex;align-items:center;gap:6px;background:var(--card);border:none;
      color:var(--text);font-family:inherit;font-size:13px;font-weight:600;
      padding:8px 14px;border-radius:999px;cursor:pointer;
    }
    .hist-pill:active{background:var(--border);}
    .progress-track{display:flex;gap:5px;margin-bottom:14px;}
    .progress-track .seg{flex:1;height:6px;border-radius:999px;background:var(--card);transition:background .25s;}
    .progress-track .seg.done{background:var(--ink);}

    .toggle{display:flex;width:fit-content;margin:0 auto;background:var(--card);border-radius:999px;padding:4px;gap:2px;}
    .toggle button{
      display:inline-flex;align-items:center;gap:6px;border:none;background:none;cursor:pointer;font-family:inherit;
      font-size:13px;font-weight:700;color:var(--muted);padding:7px 16px;border-radius:999px;
    }
    .toggle button.on{background:var(--bg);color:var(--text);box-shadow:0 1px 3px rgba(70,55,25,0.12);}
    .toggle .ic{width:15px;height:15px;display:inline-flex;}

    /* ---- Content ---- */
    .content{flex:1;min-height:0;padding:18px 20px 20px;overflow-y:auto;-webkit-overflow-scrolling:touch;position:relative;}
    @keyframes fade{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:none;}}
    .stage{animation:fade .2s ease;}

    .quote{color:var(--text);font-size:15px;font-style:italic;margin:14px 0 12px;text-align:center;}
    h2{font-size:22px;font-weight:800;letter-spacing:-0.01em;margin:0 0 12px;text-align:center;line-height:1.15;}
    .subtitle{color:var(--text);font-size:15px;margin:0 0 20px;font-weight:600;text-align:center;}

    /* start screen */
    .start-center{display:flex;flex-direction:column;align-items:center;text-align:center;padding-top:26px;}
    .mascot{width:auto;height:120px;margin-bottom:24px;}
    .start-center h2{font-size:24px;margin-bottom:2px;}
    .start-center .subtitle{margin-bottom:24px;}
    .field-error{color:var(--contre);font-size:14px;font-weight:600;text-align:center;margin-top:14px;min-height:18px;}
    textarea,input.deci{
      width:100%;border:none;border-radius:var(--radius);background:var(--card);
      padding:16px;font-family:inherit;font-size:16px;color:var(--text);resize:none;font-weight:400;
    }
    textarea::placeholder,input::placeholder{color:var(--muted);font-weight:400;font-size:15px;}
    textarea:focus,input.deci:focus{outline:none;}
    textarea{min-height:120px;text-align:left;}

    /* lists */
    .list{display:flex;flex-direction:column;gap:10px;margin-bottom:14px;}
    .list-item{display:flex;align-items:center;gap:10px;background:var(--card);border-radius:14px;padding:6px 8px 6px 14px;}
    .list-item .li-ic{flex:0 0 auto;width:18px;height:18px;display:inline-flex;}
    .list-item input{flex:1;border:none;background:none;font-size:16px;font-family:inherit;color:var(--text);padding:10px 0;font-weight:400;}
    .list-item input:focus{outline:none;}
    .li-del{flex:0 0 auto;width:34px;height:34px;border:none;background:none;color:var(--muted);cursor:pointer;border-radius:9px;display:inline-flex;align-items:center;justify-content:center;}
    .li-del:active{background:var(--border);}
    .add-item{width:100%;border:1.6px dashed var(--ink);border-radius:14px;background:none;padding:14px;font-size:16px;color:var(--text);cursor:pointer;font-family:inherit;font-weight:700;text-align:center;}
    .add-item:active{background:var(--card-soft);}

    /* rate screen */
    .glow{position:absolute;left:50%;top:46%;width:340px;height:300px;transform:translate(-50%,-50%);
      background:radial-gradient(closest-side, rgba(255,150,60,0.28), rgba(255,150,60,0));
      pointer-events:none;z-index:0;}
    .rate-wrap{position:relative;z-index:1;}
    .arg-card{display:flex;align-items:center;gap:10px;background:var(--card);border-radius:14px;padding:14px 16px;margin-bottom:34px;}
    .arg-card .li-ic{width:18px;height:18px;flex:0 0 auto;}
    .arg-card .arg-txt{font-size:16px;font-weight:700;color:var(--text);}
    .bubble{display:block;width:max-content;margin:0 auto 14px;background:var(--bg);border-radius:16px;
      padding:8px 18px;font-size:26px;font-weight:800;color:var(--text);box-shadow:0 4px 14px rgba(70,55,25,0.12);position:relative;}
    .bubble::after{content:"";position:absolute;left:50%;bottom:-7px;transform:translateX(-50%) rotate(45deg);
      width:14px;height:14px;background:var(--bg);border-radius:3px;box-shadow:3px 3px 8px rgba(70,55,25,0.06);}
    .rating{display:flex;gap:5px;justify-content:center;touch-action:none;cursor:pointer;}
    .rating .seg{flex:1;max-width:26px;height:34px;border:none;border-radius:8px;background:var(--card);cursor:pointer;padding:0;transition:transform .08s;}
    .rating .seg:active{transform:scale(0.9);}
    .rate-legend{display:flex;justify-content:space-between;font-size:13px;color:var(--text);margin-top:10px;font-weight:700;}

    /* result */
    .verdict-card{background:var(--card);border-radius:var(--radius);padding:26px 20px;text-align:center;margin-bottom:14px;}
    .verdict{font-size:24px;font-weight:800;margin:0 0 6px;letter-spacing:-0.01em;color:var(--text);}
    .verdict-sub{font-size:15px;color:var(--text);margin:0;font-weight:600;}
    .balance-bar{display:flex;height:34px;border-radius:999px;overflow:hidden;margin:22px 0 10px;background:var(--card-soft);}
    .balance-bar .bp{background:linear-gradient(90deg,var(--rate-a),var(--pour));transition:width .35s;}
    .balance-bar .bc{background:linear-gradient(90deg,var(--contre),var(--rate-b));transition:width .35s;}
    .balance-legend{display:flex;justify-content:space-between;font-size:15px;font-weight:800;color:var(--text);}
    .score-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px;}
    .score-box{border-radius:14px;padding:16px;text-align:center;background:var(--card);}
    .score-box .num{font-size:26px;font-weight:800;color:var(--text);}
    .score-box .lbl{font-size:13px;color:var(--text);text-transform:uppercase;letter-spacing:0.04em;font-weight:700;}
    .breakdown h4{font-size:13px;text-transform:uppercase;letter-spacing:0.05em;color:var(--text);margin:16px 0 8px;font-weight:800;}
    .bd-row{display:flex;justify-content:space-between;gap:12px;font-size:16px;padding:12px 14px;margin-bottom:7px;background:var(--card);border-radius:12px;font-weight:600;}
    .bd-row .bd-score{font-weight:800;color:var(--text);white-space:nowrap;}

    /* history */
    .home-title{font-size:22px;font-weight:800;margin:6px 0 6px;letter-spacing:-0.01em;text-align:center;}
    .home-sub{font-size:15px;color:var(--text);margin:0 0 22px;font-weight:600;text-align:center;}
    .new-btn{width:100%;border:none;border-radius:var(--radius);background:var(--ink);color:#fff;padding:16px;font-size:16px;font-weight:700;cursor:pointer;font-family:inherit;margin-bottom:26px;}
    .new-btn:active{opacity:.9;}
    .history-label{font-size:13px;text-transform:uppercase;letter-spacing:0.06em;color:var(--text);font-weight:800;margin:0 0 12px;}
    .card{background:var(--card);border-radius:var(--radius);padding:16px;margin-bottom:12px;cursor:pointer;display:flex;align-items:flex-start;gap:12px;}
    .card:active{background:var(--border);}
    .card-body{flex:1;min-width:0;}
    .card-title{font-size:16px;font-weight:800;margin-bottom:5px;overflow:hidden;text-overflow:ellipsis;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;}
    .card-title.empty{color:var(--muted);font-weight:700;font-style:italic;}
    .card-meta{font-size:13px;color:var(--text);display:flex;align-items:center;gap:8px;flex-wrap:wrap;font-weight:700;}
    .chip{display:inline-block;font-size:12px;font-weight:800;padding:3px 9px;border-radius:999px;color:var(--text);}
    .chip.pour{background:var(--pour-soft);}
    .chip.contre{background:var(--contre-soft);}
    .chip.eq{background:var(--card-soft);}
    .chip.empty{background:var(--card-soft);}
    .card-del{flex:0 0 auto;width:32px;height:32px;border:none;background:none;color:var(--muted);cursor:pointer;border-radius:9px;display:inline-flex;align-items:center;justify-content:center;}
    .card-del:active{background:var(--border);}
    .home-empty{text-align:center;color:var(--muted);font-size:14px;padding:40px 10px;font-weight:600;}

    /* footer */
    .footer{display:flex;gap:10px;padding:14px 20px calc(16px + env(safe-area-inset-bottom));background:var(--bg);}
    .btn{border:none;border-radius:var(--radius);padding:16px 18px;font-size:16px;font-weight:700;cursor:pointer;font-family:inherit;}
    .btn:active{opacity:.9;}
    .btn:disabled{opacity:.3;cursor:default;}
    .btn:disabled:active{opacity:.3;}
    .btn-primary{flex:1;background:var(--ink);color:#fff;display:inline-flex;align-items:center;justify-content:center;gap:8px;}
    .btn-circle{flex:0 0 auto;width:54px;background:var(--bg);border:1.5px solid var(--ink);color:var(--text);display:inline-flex;align-items:center;justify-content:center;}
    .btn-circle:active{background:var(--card-soft);}

    /* Titres en Sanchez (slab serif) */
    h2,.home-title,.verdict,.bubble,.score-box .num{
      font-family:"Sanchez",Georgia,"Times New Roman",serif;
      font-weight:400;letter-spacing:0;
    }
  </style>
</head>
<body>

    <header class="topbar" id="topbar"></header>
    <main class="content" id="content"></main>
    <footer class="footer" id="footer"></footer>
  </div>

.5479 47.5934 31.7831C47.8243 31.7099 48.0714 31.7044 48.3053 31.7673C48.5392 31.8303 48.7502 31.959 48.9132 32.1381C49.0762 32.3173 49.1844 32.5395 49.225 32.7783C49.2656 33.0171 49.2368 33.2626 49.1421 33.4855Z\" fill=\"#FF5E3D\"/>\n<path d=\"M6.7361 1.13642C7.81158 0.418272 9.06928 0.0250554 10.3587 0.00023757L10.6164 4.50497e-05L10.8754 0.00961245C12.0766 0.0784413 13.2376 0.467062 14.2385 1.13478L14.4509 1.28256L14.4634 1.2914L14.4753 1.29932L20.4404 5.67931L27.6276 3.92035C28.8892 3.60825 30.2115 3.66874 31.4369 4.09167L31.6837 4.18208L31.9248 4.28164C33.1023 4.79365 34.1089 5.63346 34.8262 6.70169C34.8325 6.71109 34.8388 6.72061 34.8451 6.73004C34.8516 6.73981 34.8591 6.74889 34.8655 6.7587L34.864 6.75839C35.6243 7.90296 36.0178 9.25261 35.9876 10.6274C35.9571 12.0147 35.497 13.3578 34.6733 14.4739L34.6749 14.4742L30.2949 20.4392L32.0548 27.6258L32.0615 27.6557C32.3803 28.9975 32.2809 30.4053 31.7766 31.689C31.2721 32.9726 30.3869 34.0716 29.2399 34.8375C28.0928 35.6034 26.7386 36 25.3596 35.9739C23.9805 35.9478 22.6423 35.5002 21.525 34.6914L21.5125 34.6825L21.5009 34.6731L15.5359 30.2931L8.3493 32.053L8.31941 32.0597C6.97746 32.3786 5.56994 32.2792 4.28614 31.7748C3.00243 31.2704 1.90353 30.3851 1.1376 29.2381C0.371739 28.091 -0.0248964 26.7368 0.00122203 25.3578L0.0114001 25.0997C0.0851067 23.8124 0.525473 22.5706 1.28374 21.5233L1.29257 21.5107L1.30202 21.4991L5.6811 15.5347L3.92213 8.34751L3.91785 8.33318L3.91448 8.31823C3.59557 6.97634 3.69511 5.56872 4.19942 4.28497L4.29929 4.04636C4.81631 2.86517 5.66085 1.8545 6.7361 1.13642Z\" fill=\"white\"/>\n<path d=\"M31.1 9.23095C31.3595 9.61311 31.4934 10.0666 31.4833 10.5284C31.4731 10.9903 31.3194 11.4375 31.0433 11.8079L25.4198 19.4681L27.6787 28.6966C27.785 29.1439 27.7519 29.6131 27.5837 30.041C27.4156 30.469 27.1205 30.8352 26.7382 31.0905C26.3558 31.3459 25.9044 31.4781 25.4447 31.4694C24.985 31.4606 24.539 31.3115 24.1665 31.0418L16.5075 25.4175L7.27779 27.6772C6.83046 27.7835 6.36131 27.7504 5.93337 27.5822C5.50543 27.4141 5.13919 27.119 4.88386 26.7367C4.62853 26.3543 4.49634 25.9029 4.50504 25.4432C4.51375 24.9835 4.66294 24.5375 4.93257 24.1651L10.5569 16.506L8.2972 7.27629C8.19089 6.82896 8.22403 6.35982 8.39216 5.93187C8.56029 5.50393 8.85537 5.13769 9.23774 4.88236C9.62012 4.62703 10.0715 4.49484 10.5312 4.50355C10.9909 4.51226 11.4369 4.66144 11.8093 4.93107L19.4696 10.5546L28.6981 8.2957C29.146 8.18269 29.618 8.21203 30.0484 8.37964C30.4789 8.54726 30.8464 8.84481 31.1 9.23095Z\" fill=\"#FFC93D\"/>\n</svg>";

    // ---------- Retour haptique ----------
    // iOS Safari (17.4+) ne supporte pas navigator.vibrate : on déclenche un léger
    // retour via un <input switch> masqué (astuce inspirée de haptics.lochie.me).
    // Android utilise l'API Vibration classique.
    const Haptics = (function(){
      let ready=false, label=null;
      function init(){
        if(ready) return; ready=true;
        try{
          label=document.createElement("label");
          label.setAttribute("aria-hidden","true");
          label.style.cssText="position:fixed;top:-9999px;left:-9999px;width:1px;height:1px;opacity:0;pointer-events:none;";
          const inp=document.createElement("input");
          inp.type="checkbox"; inp.setAttribute("switch","");
          label.appendChild(inp);
          (document.body||document.documentElement).appendChild(label);
        }catch(e){}
      }
      return { tap(){
        init();
        try{ if(navigator.vibrate) navigator.vibrate(7); }catch(e){}
        try{ if(label) label.click(); }catch(e){}
      }};
    })();

    // ---------- Store ----------
    const defaultStore = { decisions:[], currentId:null, cursor:{stage:"start"}, view:"flow" };
    let storageOk = true;
    try{ localStorage.setItem("__t__","1"); localStorage.removeItem("__t__"); }catch(e){ storageOk=false; }
    let store = load();

    function load(){
      if(storageOk){
        try{
          const raw=localStorage.getItem(STORAGE_KEY);
          if(raw) return Object.assign({},defaultStore,JSON.parse(raw));
          const v3=localStorage.getItem(OLD_V3);
          if(v3){ const o=JSON.parse(v3); const m=JSON.parse(JSON.stringify(defaultStore)); m.decisions=(o.decisions||[]); return m; }
        }catch(e){}
      }
      return JSON.parse(JSON.stringify(defaultStore));
    }
    function save(){ if(!storageOk) return; try{ localStorage.setItem(STORAGE_KEY,JSON.stringify(store)); }catch(e){ storageOk=false; } }
    function uid(){ return Date.now().toString(36)+Math.random().toString(36).slice(2,7); }

    function current(){ return store.decisions.find(d=>d.id===store.currentId)||null; }
    function commit(){ const d=current(); if(d) d.updated=Date.now(); save(); }
    function sideList(d,side){ return side==="pro"?d.pros:d.cons; }
    function named(list){ return list.filter(i=>i.text.trim()!==""); }
    function isEmptyDecision(d){ return d.title.trim()==="" && named(d.pros).length===0 && named(d.cons).length===0; }
    function pruneEmpty(){ store.decisions=store.decisions.filter(d=>d.id===store.currentId||!isEmptyDecision(d)); }

    function totalsOf(d){
      const pro=named(d.pros).reduce((s,i)=>s+(i.score||0),0);
      const con=named(d.cons).reduce((s,i)=>s+(i.score||0),0);
      return {pro,con};
    }
    function verdictOf(d){
      const {pro,con}=totalsOf(d);
      if(pro+con===0) return {label:"À compléter",cls:"empty"};
      if(pro>con) return {label:"Plutôt pour",cls:"pour"};
      if(con>pro) return {label:"Plutôt contre",cls:"contre"};
      return {label:"Équilibré",cls:"eq"};
    }
    function fmtDate(ts){ try{ return new Date(ts).toLocaleDateString("fr-FR",{day:"numeric",month:"short",year:"numeric"}); }catch(e){ return ""; } }
    function rateColor(i){ const t=(i-1)/(MAX_SCORE-1); const g=Math.round(216-t*(216-94)); return "rgb(255,"+g+",61)"; }

    // ---------- Flux dynamique ----------
    function buildFlow(d){
      const f=[{stage:"start"},{stage:"list",side:"pro"}];
      named(d.pros).forEach(it=>f.push({stage:"rate",side:"pro",id:it.id}));
      f.push({stage:"list",side:"con"});
      named(d.cons).forEach(it=>f.push({stage:"rate",side:"con",id:it.id}));
      f.push({stage:"result"});
      return f;
    }
    function sameCursor(a,b){ return a.stage===b.stage && (a.side||null)===(b.side||null) && (a.id||null)===(b.id||null); }
    function flowInfo(){ const d=current(); const f=buildFlow(d); const i=f.findIndex(c=>sameCursor(c,store.cursor)); return {f,i}; }
    function setCursor(cur){ store.cursor=cur; save(); render(); document.getElementById("content").scrollTop=0; }
    function goNext(){ const {f,i}=flowInfo(); if(i<0){ setCursor(f[0]); return;} if(i<f.length-1) setCursor(f[i+1]); else finishToHistory(); }
    function goPrev(){ const {f,i}=flowInfo(); if(i>0) setCursor(f[i-1]); }

    // ---------- Décisions ----------
    function newDecision(){
      const d={id:uid(),title:"",pros:[],cons:[],created:Date.now(),updated:Date.now()};
      store.decisions.push(d); store.currentId=d.id; store.cursor={stage:"start"}; store.view="flow";
      save(); render();
      const ta=document.getElementById("decision-input"); if(ta) ta.focus();
    }
    function openDecision(id){ store.currentId=id; store.cursor={stage:"start"}; store.view="flow"; save(); render(); }
    function deleteDecision(id){
      if(!confirm("Supprimer définitivement cette décision ?")) return;
      store.decisions=store.decisions.filter(d=>d.id!==id);
      if(store.currentId===id) store.currentId=null;
      save(); render();
    }
    function openHistory(){ pruneEmpty(); store.view="history"; save(); render(); }
    function returnToFlow(){ if(current()){ store.view="flow"; save(); render(); } else newDecision(); }
    function finishToHistory(){ store.currentId=null; pruneEmpty(); store.view="history"; save(); render(); }

    // ---------- Items ----------
    function addItem(side){
      const it={id:uid(),text:"",score:5};
      sideList(current(),side).push(it); commit(); render();
      const el=document.querySelector('[data-id="'+it.id+'"] input'); if(el) el.focus();
    }
    function updateText(side,id,text){ const it=sideList(current(),side).find(i=>i.id===id); if(it){ it.text=text; commit(); } }
    function deleteItem(side,id){ const d=current(); if(side==="pro") d.pros=d.pros.filter(i=>i.id!==id); else d.cons=d.cons.filter(i=>i.id!==id); commit(); render(); }
    function setScore(side,id,score){ const it=sideList(current(),side).find(i=>i.id===id); if(it){ it.score=score; commit(); render(); } }

    // ---------- Rendu ----------
    const $ = (t,c,h)=>{ const e=document.createElement(t); if(c)e.className=c; if(h!=null)e.innerHTML=h; return e; };

    function render(){
      const inFlow = store.view==="flow" && current();
      if(inFlow) renderFlow(); else renderHistory();
    }

    function toggleEl(activeSide){
      const wrap=$("div","toggle");
      [["pro","POUR",IC.sparkle],["con","CONTRE",IC.flag]].forEach(function(t){
        const side=t[0], label=t[1], ic=t[2];
        const b=$("button",side===activeSide?"on":"");
        b.innerHTML='<span class="ic">'+ic+'</span>'+label;
        b.addEventListener("click",()=>{ if(side!==activeSide) setCursor({stage:"list",side:side}); });
        wrap.appendChild(b);
      });
      return wrap;
    }
    function progressEl(){
      const info=flowInfo(); const track=$("div","progress-track");
      info.f.forEach((c,idx)=>track.appendChild($("div","seg"+(idx<=info.i?" done":""))));
      return track;
    }

    function renderFlow(){
      const d=current();
      const info=flowInfo();
      const cur = info.i<0 ? info.f[0] : store.cursor;
      if(info.i<0) store.cursor=cur;
      const stage=cur.stage;
      const top=document.getElementById("topbar");
      const content=document.getElementById("content");
      const foot=document.getElementById("footer");
      top.innerHTML=""; content.innerHTML=""; foot.innerHTML="";

      // Header
      if(stage==="start"){
        const pill=$("button","hist-pill",IC.history+"<span>Historique</span>");
        pill.addEventListener("click",openHistory);
        top.appendChild(pill);
      } else {
        top.appendChild(progressEl());
        if(stage==="list"||stage==="rate") top.appendChild(toggleEl(cur.side));
      }

      // Body
      const body=$("div","stage");
      if(stage==="start") body.appendChild(renderStart(d));
      else if(stage==="list") body.appendChild(renderList(d,cur.side));
      else if(stage==="rate") body.appendChild(renderRate(d,cur.side,cur.id));
      else if(stage==="result") body.appendChild(renderResult(d));
      content.appendChild(body);

      // Footer
      if(stage==="start"){
        const b=$("button","btn btn-primary","Démarrer");
        b.addEventListener("click",()=>{
          if(current().title.trim()){ goNext(); }
          else {
            const e=document.getElementById("start-error"); if(e) e.textContent="Écris d'abord ta problématique.";
            const ta=document.getElementById("decision-input"); if(ta) ta.focus();
          }
        });
        foot.appendChild(b);
      } else {
        const back=$("button","btn btn-circle",IC.back);
        back.addEventListener("click",goPrev); foot.appendChild(back);
        const nextLabel = stage==="result" ? "Terminer" : 'Suivant <span style="display:inline-flex">'+IC.arrow+'</span>';
        const nx=$("button","btn btn-primary",nextLabel);
        nx.addEventListener("click",()=>{
          if(stage==="list" && !named(sideList(d,cur.side)).length){
            const e=document.getElementById("list-error");
            if(e) e.textContent = cur.side==="pro" ? "Ajoute au moins un avantage." : "Ajoute au moins un inconvénient.";
            return;
          }
          goNext();
        });
        foot.appendChild(nx);
      }
    }

    function renderStart(d){
      const wrap=$("div","start-center");
      wrap.innerHTML=MASCOT;
      wrap.appendChild($("h2",null,"Quelle est ta problématique ?"));
      wrap.appendChild($("p","subtitle","Formule la décision à prendre en une phrase."));
      const ta=$("textarea"); ta.id="decision-input"; ta.placeholder="Ex : Est-ce que je devrais accepter ce nouveau poste ?"; ta.value=d.title;
      ta.addEventListener("input",e=>{ d.title=e.target.value; commit(); const er=document.getElementById("start-error"); if(er) er.textContent=""; });
      wrap.appendChild(ta);
      const err=$("p","field-error"); err.id="start-error";
      wrap.appendChild(err);
      return wrap;
    }

    function renderList(d,side){
      const wrap=$("div");
      if(d.title.trim()) wrap.appendChild($("p","quote","« "+d.title.trim()+" »"));
      wrap.appendChild($("h2",null, side==="pro"
        ? "Liste tout ce qui plaide en faveur de cette décision."
        : "Liste tout ce qui plaide contre cette décision."));
      const list=$("div","list");
      const items=sideList(d,side);
      items.forEach(it=>{
        const row=$("div","list-item"); row.setAttribute("data-id",it.id);
        row.appendChild($("span","li-ic", side==="pro"?IC.sparkle:IC.flag));
        const inp=document.createElement("input"); inp.type="text"; inp.value=it.text;
        inp.placeholder=side==="pro"?"Un avantage…":"Un inconvénient…";
        inp.addEventListener("input",e=>{ updateText(side,it.id,e.target.value); const le=document.getElementById("list-error"); if(le) le.textContent=""; });
        row.appendChild(inp);
        const del=$("button","li-del",IC.close); del.addEventListener("click",()=>deleteItem(side,it.id));
        row.appendChild(del);
        list.appendChild(row);
      });
      wrap.appendChild(list);
      const add=$("button","add-item", side==="pro"?"+ ajouter un avantage":"+ ajouter un inconvénient");
      add.addEventListener("click",()=>addItem(side));
      wrap.appendChild(add);
      const err=$("p","field-error"); err.id="list-error"; wrap.appendChild(err);
      return wrap;
    }

    function renderRate(d,side,id){
      const it=sideList(d,side).find(x=>x.id===id);
      if(!it){ setTimeout(()=>setCursor({stage:"list",side:side}),0); return $("div"); }
      const wrap=$("div","rate-wrap");
      wrap.appendChild($("h2",null,"Quelle importance donnes-tu à cet argument ?"));
      const card=$("div","arg-card");
      card.appendChild($("span","li-ic", side==="pro"?IC.sparkle:IC.flag));
      card.appendChild($("span","arg-txt", it.text.trim()||"(sans titre)"));
      wrap.appendChild(card);

      const glow=$("div","glow");
      const inner=$("div"); inner.style.position="relative"; inner.style.zIndex="1";
      const bubble=$("span","bubble",(it.score||0)+"/"+MAX_SCORE);
      inner.appendChild(bubble);
      const rating=$("div","rating");
      const segs=[];
      for(let i=1;i<=MAX_SCORE;i++){ const seg=$("button","seg"); segs.push(seg); rating.appendChild(seg); }

      // Peint la barre + la bulle pour une valeur donnée (sans re-render complet)
      function paint(v){
        for(let i=1;i<=MAX_SCORE;i++) segs[i-1].style.background = i<=v ? rateColor(i) : "";
        bubble.textContent = v+"/"+MAX_SCORE;
      }
      paint(it.score||0);

      // Glisser du doigt : la note suit la position horizontale
      function valFromX(clientX){
        const r=rating.getBoundingClientRect();
        let ratio=(clientX-r.left)/r.width; if(ratio<0)ratio=0; if(ratio>1)ratio=1;
        let v=Math.ceil(ratio*MAX_SCORE); if(v<1)v=1; if(v>MAX_SCORE)v=MAX_SCORE;
        return v;
      }
      let dragging=false, lastV=it.score||0;
      function applyX(clientX){
        const v=valFromX(clientX);
        if(v!==lastV){ lastV=v; it.score=v; paint(v); Haptics.tap(); }
      }
      rating.addEventListener("pointerdown",e=>{ dragging=true; try{rating.setPointerCapture(e.pointerId);}catch(_){}; applyX(e.clientX); });
      rating.addEventListener("pointermove",e=>{ if(dragging) applyX(e.clientX); });
      function endDrag(){ if(dragging){ dragging=false; commit(); } }
      rating.addEventListener("pointerup",endDrag);
      rating.addEventListener("pointercancel",endDrag);

      inner.appendChild(rating);
      inner.appendChild($("div","rate-legend",'<span>Pas important</span><span>Essentiel</span>'));

      const holder=$("div"); holder.style.position="relative"; holder.style.padding="10px 0";
      holder.appendChild(glow); holder.appendChild(inner);
      wrap.appendChild(holder);
      return wrap;
    }

    function renderResult(d){
      const wrap=$("div");
      if(d.title.trim()) wrap.appendChild($("p","quote","« "+d.title.trim()+" »"));
      const t=totalsOf(d); const pro=t.pro, con=t.con;
      const total=pro+con, diff=pro-con;
      const vc=$("div","verdict-card");
      let vlabel="Rien à peser", vcls="", vsub="Ajoute des avantages et des inconvénients pour obtenir un verdict.";
      if(total>0 && diff>0){ vlabel="Plutôt POUR"; vcls="pour"; vsub="Les avantages l'emportent de "+diff+" point"+(diff>1?"s":"")+"."; }
      else if(total>0 && diff<0){ vlabel="Plutôt CONTRE"; vcls="contre"; vsub="Les inconvénients l'emportent de "+(-diff)+" point"+(-diff>1?"s":"")+"."; }
      else if(total>0){ vlabel="Équilibré"; vsub="Le pour et le contre se valent. À toi de trancher."; }
      vc.appendChild($("p","verdict "+vcls,vlabel));
      vc.appendChild($("p","verdict-sub",vsub));
      const bar=$("div","balance-bar");
      const pp=total?(pro/total*100):50;
      const bp=$("div","bp"); bp.style.width=pp+"%"; const bc=$("div","bc"); bc.style.width=(100-pp)+"%";
      bar.appendChild(bp); bar.appendChild(bc); vc.appendChild(bar);
      vc.appendChild($("div","balance-legend",'<span class="lp">Pour '+pro+'</span><span class="lc">Contre '+con+'</span>'));
      wrap.appendChild(vc);
      const grid=$("div","score-grid");
      grid.appendChild($("div","score-box pour",'<div class="num">'+pro+'</div><div class="lbl">Poids du pour</div>'));
      grid.appendChild($("div","score-box contre",'<div class="num">'+con+'</div><div class="lbl">Poids du contre</div>'));
      wrap.appendChild(grid);
      const bd=$("div","breakdown");
      function block(title,items){ if(!items.length) return; bd.appendChild($("h4",null,title));
        items.forEach(it=>bd.appendChild($("div","bd-row",'<span>'+escapeHtml(it.text.trim())+'</span><span class="bd-score">'+(it.score||0)+'/'+MAX_SCORE+'</span>'))); }
      block("Avantages",named(d.pros)); block("Inconvénients",named(d.cons));
      wrap.appendChild(bd);
      return wrap;
    }

    function renderHistory(){
      const top=document.getElementById("topbar");
      const content=document.getElementById("content");
      const foot=document.getElementById("footer");
      top.innerHTML=""; content.innerHTML=""; foot.innerHTML="";
      if(current()){
        const close=$("button","hist-pill",IC.close+"<span>Fermer</span>");
        close.addEventListener("click",returnToFlow); top.appendChild(close);
      }
      const body=$("div","stage");
      body.appendChild($("h1","home-title","Vos décisions"));
      body.appendChild($("p","home-sub","Pèse le pour et le contre, et reprends tes questionnements quand tu veux."));
      const nb=$("button","new-btn","+ Nouvelle décision"); nb.addEventListener("click",newDecision); body.appendChild(nb);

      const list=store.decisions.filter(d=>!isEmptyDecision(d)).sort((a,b)=>b.updated-a.updated);
      if(!list.length){ body.appendChild($("div","home-empty","Aucune décision pour l'instant.<br>Crées-en une pour commencer.")); }
      else{
        body.appendChild($("p","history-label","Historique"));
        list.forEach(d=>{
          const card=$("div","card");
          card.addEventListener("click",e=>{ if(e.target.closest(".card-del")) return; openDecision(d.id); });
          const bodyc=$("div","card-body");
          const t=d.title.trim();
          bodyc.appendChild($("div","card-title"+(t?"":" empty"), t?escapeHtml(t):"Décision sans titre"));
          const v=verdictOf(d);
          bodyc.appendChild($("div","card-meta",
            '<span class="chip '+v.cls+'">'+v.label+'</span>'+
            '<span>'+named(d.pros).length+' pour · '+named(d.cons).length+' contre</span>'+
            '<span>'+fmtDate(d.updated)+'</span>'));
          card.appendChild(bodyc);
          const del=$("button","card-del",IC.close); del.addEventListener("click",()=>deleteDecision(d.id));
          card.appendChild(del);
          body.appendChild(card);
        });
      }
      content.appendChild(body);
    }

    function escapeHtml(s){ return s.replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c])); }

    // ---------- Démarrage ----------
    store.currentId=null; pruneEmpty();
    const startD={id:uid(),title:"",pros:[],cons:[],created:Date.now(),updated:Date.now()};
    store.decisions.push(startD); store.currentId=startD.id; store.cursor={stage:"start"}; store.view="flow";
    save(); render();
  </script>
</body>
</html>
